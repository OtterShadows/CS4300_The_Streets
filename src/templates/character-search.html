        <!-- Header -->
        <div class="search-header">
            <div class="header-branding">
                <h1>The Streets</h1>
            </div>
            <div class="input-box" onclick="sendFocus()">
                <img src="{{ url_for('static', filename='images/mag.png') }}" />

        <!-- Results Section -->
        <div id="results-container" style="display: none;" class="results-container">

            <!-- Hero Character Card -->

                <!-- Navigation Arrows -->
                <button class="nav-arrow prev-arrow" id="prev-char">‹</button>
                <button class="nav-arrow next-arrow" id="next-char">›</button>

                <div class="hero-content">
                    <div class="hero-info">
                        <div class="hero-label">Top Result for Your Query</div>
                        <h1 id="hero-name">-</h1>
                        <div class="hero-description" id="hero-summary">-</div>
                        <button class="read-more-btn" onclick="expandSummary()">Related Info</button>
                    </div>
                    <div class="hero-artwork">
                        <div class="artwork-placeholder" id="artwork-placeholder">
                            <div class="rank-badge" id="hero-rank">GOAT</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Grid Section -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-content">
                        <div class="stat-label">Rating</div>
                        <div class="stat-value" id="grid-rating">9.2</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-content">
                        <div class="stat-label">Community Consensus</div>
                        <div class="stat-value" id="grid-sentiment">Very Positive</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-label">Mentions</div>
                        <div class="stat-value" id="grid-comments">1.2K</div>
                    </div>
                </div>
            </div>

            <!-- Full Width Sections -->
            <div class="full-width-sections">
                <!-- Graph Section -->
                <div class="graph-section">
                    <h3>📈 Popularity Trend</h3>
                    <p class="graph-context">Based on community discussion about "<span
                            id="query-term">character</span>"</p>
                    <div
                        style="position: relative; height: 300px; width: 100%; background-color: #f5f5f5; border-radius: 4px;">
                        <canvas id="ratingsChart"></canvas>
                    </div>
                </div>

                <!-- Evidence Section -->
                <div class="evidence-section">
                    <h3>💬 Community Evidence</h3>
                    <p class="section-subtitle">What people are saying (<span id="retrieved-count">0</span> top
                        comments)</p>
                    <div id="retrieved-container" class="evidence-list">
                        <!-- Retrieved comments will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

        function sendFocus() {
            document.getElementById('character-search-val').focus();
        }

        function handleSearch(event) {
            const query = document.getElementById('character-search-val').value.toLowerCase().trim();

            // Search only on Enter key
            if (event.key === 'Enter' && query.length > 0) {
                performSearch(query);
            } else if (query.length === 0) {
                document.getElementById('results-container').style.display = 'none';
            }
        }

        function performSearch(query) {
            const trimmedQuery = query.toLowerCase().trim();
            console.log(`performSearch called with query: "${trimmedQuery}"`);
            if (trimmedQuery.length === 0) {
                document.getElementById('results-container').style.display = 'none';
                return;
            }
            fetch(`/search?q=${encodeURIComponent(trimmedQuery)}`)
                .then(res => res.json())
                .then(data => {
                    const characterName = data.character || 'ERROR';
                    console.log(`Best character match: "${characterName}"`);
                    displayCharacterResults(characterName, trimmedQuery)
                        ;
                })
                .catch(err => {
                    console.log(`Error during search for "${characterName}":`, err);
                    displayCharacterResults('ERROR', trimmedQuery);
                });
        }

        function displayCharacterResults(characterKey, query) {
            if (!query) {
                query = document.getElementById('character-search-val').value.toLowerCase().trim();
            }

            fetch(`/csearch?q=${encodeURIComponent(characterKey)}`)
                .then(res => res.json())
                .then(data => {
                    console.log(`Received character data for ${characterKey}:`, data);
                    const character = data;
                    console.log(`Displaying results for ${character.name} (${characterKey}) based on query: "${query}"`);

                    // Show the results container
                    const resultsContainer = document.getElementById('results-container');
                    if (!resultsContainer) {
                        console.error('results-container not found');
                        return;
                    }
                    resultsContainer.style.display = 'block';

                    // Update hero section - with safety checks
                    const heroName = document.getElementById('hero-name');
                    const heroRank = document.getElementById('hero-rank');
                    const heroSummary = document.getElementById('hero-summary');

                    if (heroName) heroName.textContent = characterKey
                    if (heroRank) heroRank.textContent = character.rank;
                    if (heroSummary) heroSummary.textContent = character.summary;

                    // Update stats grid
                    const gridRating = document.getElementById('grid-rating');
                    const gridSentiment = document.getElementById('grid-sentiment');
                    const gridComments = document.getElementById('grid-comments');

                    if (gridRating) gridRating.textContent = character.currentRating.toFixed(1);
                    if (gridSentiment) gridSentiment.textContent = character.sentiment;

                    const commentsShort = character.total_comments >= 1000
                        ? (character.total_comments / 1000).toFixed(1) + 'K'
                        : character.total_comments;
                        console.log(`Total comments for ${character.name}: ${character.total_comments}`);
                    if (!character.total_comments){
                        gridComments.textContent = 'shits scuffed chief';
                    }
                    else{
                        gridComments.textContent = commentsShort
                    }

                    // Update query context (show what was searched)
                    const queryTerm = document.getElementById('query-term');
                    const retrievedCount = document.getElementById('retrieved-count');

                    if (queryTerm) queryTerm.textContent = query;
                    if (retrievedCount) retrievedCount.textContent = character.retrieved.length;

                    // Update chart
                    updateChart(character, query);

                    // Update retrieved documents
                    updateRetrieved(character);

                    // Scroll to results
                    document.getElementById('results-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                })
                .catch(err => {
                    console.error(`Failed to fetch character data for ${characterKey}:`, err);
                    alert('Sorry, something went wrong while fetching character data. Please try again.');
                });
        }

        function updateChart(character, query) {
            try {
                const chartCanvas = document.getElementById('ratingsChart');
                if (!chartCanvas) {
                    console.error('Chart canvas not found');
                    return;
                }

                const ctx = chartCanvas.getContext('2d');

                if (chartInstance) {
                    chartInstance.destroy();
                }

                const ratingData = character.ratings_over_time.map(d => ({
                    date: new Date(d.date * 1000),
                    rating: d.rating,
                    sentiment: d.sentiment
                }));
                const maxRating = Math.max(...ratingData.map(d => d.rating)); // finds max rating to determine
                // y-axis scale
                console.log(`Creating chart for ${character.name} with ${ratingData.length} data points`);

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ratingData.map(d => d.date.toLocaleDateString()),
                        datasets: [{
                            label: character.name + ' Rating',
                            data: ratingData.map(d => d.rating),
                            borderColor: '#4285F4',
                            backgroundColor: 'rgba(66, 133, 244, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#4285F4',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 6,
                            pointHoverRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                labels: {
                                    font: { size: 14 },
                                    usePointStyle: true
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                min: 0,
                                max: maxRating + 10,
                                ticks: {
                                    font: { size: 12 }
                                }
                            },
                            x: {
                                ticks: {
                                    font: { size: 12 }
                                }
                            }
                        }
                    }
                });
                console.log('Chart created successfully');
            } catch (error) {
                console.error('Error creating chart:', error);
            }
        }

        function updateCommentary(character) {
            const commentContainer = document.getElementById('commentary-container');
            commentContainer.innerHTML = '';

            character.comments.forEach(comment => {
                const commentEl = document.createElement('div');
                commentEl.className = `comment ${comment.sentiment}`;
                commentEl.innerHTML = `
                    <div class="comment-header">
                        <span class="comment-user">@${comment.user}</span>
                        <span class="comment-rating">${'★'.repeat(comment.rating)}</span>
                    </div>
                    <p class="comment-text">${comment.text}</p>
                    <div class="comment-meta">
                        <span class="relevance-score">Score: ${(comment.score * 100).toFixed(0)}%</span>
                        <span class="timestamp">${comment.timestamp}</span>
                    </div>
                `;
                commentContainer.appendChild(commentEl);
            });
        }

        function updateRetrieved(character) {
            try {
                const retrievedContainer = document.getElementById('retrieved-container');
                if (!retrievedContainer) {
                    console.error('Retrieved container not found');
                    return;
                }

                retrievedContainer.innerHTML = '';
                console.log(`Clearing retrieved container and adding ${character.retrieved.length} comments`);

                character.retrieved.forEach((comment, index) => {
                    const commentEl = document.createElement('div');
                    commentEl.className = `retrieved-comment ${comment.sentiment}`;
                    commentEl.innerHTML = `
                        <div class="retrieved-header">
                            <span class="retrieved-user">@${comment.user}</span>
                            <span class="retrieved-meta">${comment.timestamp}</span>
                        </div>
                        <p class="retrieved-text">${comment.text}</p>
                        <div class="retrieved-footer">
                            <span class="relevance-score">Relevance: ${(comment.score * 100).toFixed(0)}%</span>
                            <span class="controversy-level">Controversy: ${(comment.controversiality * 100).toFixed(0)}%</span>
                        </div>
                    `;
                    retrievedContainer.appendChild(commentEl);
                    console.log(`Added comment ${index + 1}: ${comment.user}`);
                });

                console.log(`Successfully added all ${character.retrieved.length} comments for ${character.name}`);
            } catch (error) {
                console.error('Error updating retrieved comments:', error);
            }
        }

        function expandSummary() {
            alert('Full details coming soon!');
        }

        // Navigation between characters
        document.addEventListener('DOMContentLoaded', function () {
            const prevBtn = document.getElementById('prev-char');
            const nextBtn = document.getElementById('next-char');

            if (prevBtn) {
                prevBtn.addEventListener('click', function () {
                    currentCharacterIndex = (currentCharacterIndex - 1 + characterKeys.length) % characterKeys.length;
                    displayCharacterResults(characterKeys[currentCharacterIndex], 'browse');
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function () {
                    currentCharacterIndex = (currentCharacterIndex + 1) % characterKeys.length;
                    displayCharacterResults(characterKeys[currentCharacterIndex], 'browse');
                });
            }
        });
    </script>
